<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <!-- 背景和标题 -->
  <rect width="900" height="700" fill="#f9f9f9"/>
  <text x="450" y="30" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">医疗陪护小程序架构图</text>
  
  <!-- 用户层 -->
  <rect x="350" y="60" width="200" height="60" rx="10" ry="10" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="450" y="95" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">用户层</text>
  <text x="450" y="115" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">微信小程序用户</text>
  
  <!-- 应用框架层 -->
  <rect x="250" y="140" width="400" height="80" rx="10" ry="10" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="450" y="175" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">应用框架层</text>
  <text x="290" y="200" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">Taro v4.1.5</text>
  <text x="450" y="200" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">React 18</text>
  <text x="610" y="200" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">NutUI-React-Taro</text>
  
  <!-- 应用组件层 -->
  <rect x="50" y="240" width="800" height="120" rx="10" ry="10" fill="#fff1f0" stroke="#f5222d" stroke-width="2"/>
  <text x="450" y="275" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">应用组件层</text>
  
  <!-- 页面组件 -->
  <rect x="80" y="290" width="200" height="70" rx="5" ry="5" fill="#fff2e8" stroke="#fa8c16" stroke-width="1"/>
  <text x="180" y="315" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">页面组件</text>
  <text x="180" y="330" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">首页 / 详情页 / 个人中心 / 订单页等</text>
  <text x="180" y="350" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">评论页 / 课程页 / 视频播放页等</text>
  
  <!-- 通用组件 -->
  <rect x="300" y="290" width="200" height="70" rx="5" ry="5" fill="#f6ffed" stroke="#a0d911" stroke-width="1"/>
  <text x="400" y="315" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">通用组件</text>
  <text x="400" y="335" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">Header / CityPicker / ServiceComponent等</text>
  
  <!-- 自定义TabBar -->
  <rect x="520" y="290" width="200" height="70" rx="5" ry="5" fill="#f0f5ff" stroke="#722ed1" stroke-width="1"/>
  <text x="620" y="315" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">自定义TabBar</text>
  <text x="620" y="335" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">导航组件</text>
  
  <!-- 状态管理层 -->
  <rect x="350" y="380" width="200" height="80" rx="10" ry="10" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="450" y="415" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">状态管理层</text>
  <text x="390" y="440" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">useAuthStore</text>
  <text x="510" y="440" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">useTabBarStore</text>
  
  <!-- 工具函数层 -->
  <rect x="250" y="490" width="400" height="80" rx="10" ry="10" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
  <text x="450" y="525" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">工具函数层</text>
  <text x="350" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">request.js</text>
  <text x="450" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">auth.js</text>
  <text x="550" y="550" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">imageUtils.js</text>
  
  <!-- 配置层 -->
  <rect x="150" y="580" width="200" height="80" rx="10" ry="10" fill="#fffbe6" stroke="#faad14" stroke-width="2"/>
  <text x="250" y="615" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">配置层</text>
  <text x="250" y="640" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">app.config.js / config/*</text>
  
  <!-- 外部服务 -->
  <rect x="550" y="580" width="200" height="80" rx="10" ry="10" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="650" y="615" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">外部服务</text>
  <text x="650" y="640" font-family="Arial" font-size="14" text-anchor="middle" fill="#666">后端API服务</text>
  
  <!-- 连接线 -->
  <line x1="450" y1="120" x2="450" y2="140" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="220" x2="450" y2="240" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="360" x2="180" y2="380" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="360" x2="400" y2="380" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="360" x2="620" y2="380" stroke="#333" stroke-width="1"/>
  <line x1="450" y1="470" x2="450" y2="490" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="570" x2="450" y2="580" stroke="#333" stroke-width="2"/>
  
  <!-- 横向连接配置层和外部服务 -->
  <line x1="150" y1="620" x2="80" y2="620" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="620" x2="80" y2="590" stroke="#333" stroke-width="1"/>
  <line x1="750" y1="620" x2="820" y2="620" stroke="#333" stroke-width="1"/>
  <line x1="820" y1="620" x2="820" y2="590" stroke="#333" stroke-width="1"/>
</svg>